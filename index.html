<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSUME ADS — On Air</title>

<!-- favicon (put favicon.png next to index.html in the repo root) -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">

<!-- SEO -->
<meta name="description" content="CONSUME ADS — a continuous, unskippable broadcast of advertisements. The ads are not the product. On air since 2026.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#fcee0a">

<!-- Open Graph / social cards -->
<meta property="og:type" content="website">
<meta property="og:title" content="CONSUME ADS — On Air">
<meta property="og:description" content="A continuous, unskippable broadcast of advertisements. Consume ads wherever you go.">
<meta property="og:image" content="favicon.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="CONSUME ADS — On Air">
<meta name="twitter:description" content="A continuous, unskippable broadcast of advertisements. The ads are not the product. The watching is.">

<!-- structured data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "CONSUME ADS",
  "alternateName": "Consume Ads Ltd.",
  "description": "A continuous, unskippable broadcast of advertisements. The ads are not the product. The watching is."
}
</script>
<style>
  :root{
    --yellow:#fcee0a;
    --cyan:#00f0ff;
    --red:#ff003c;
    --ink:#0b0b0d;
    --text:#e8e6df;
    --dim:#7a786e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:#000;
    color:var(--text);
    font-family:"Rajdhani","Chakra Petch","Bahnschrift","Arial Narrow",Arial,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  video{
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:contain;
    background:#000;
  }

  #crt{
    position:absolute; inset:0; pointer-events:none; z-index:5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.14) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
    opacity:.55;
  }

  #static{
    position:absolute; inset:0; z-index:6; pointer-events:none;
    opacity:0; background:#000;
  }
  #static.zap{animation:zap .28s steps(2,end);}
  @keyframes zap{0%{opacity:1;}100%{opacity:0;}}
  #static canvas{width:100%; height:100%;}

  #bug{
    position:absolute; top:22px; left:24px; z-index:8;
    display:flex; align-items:center; gap:10px;
    user-select:none; pointer-events:none;
  }
  #bug .tag{
    background:var(--yellow); color:#000;
    font-weight:800; font-size:20px; letter-spacing:.06em;
    padding:3px 12px 5px;
    clip-path:polygon(0 0,100% 0,100% 74%,92% 100%,0 100%);
    pointer-events:auto; cursor:pointer;
  }

  #about{
    position:absolute; top:64px; left:24px; z-index:16;
    display:none; width:min(300px, 86vw);
    background:rgba(11,11,13,.94);
    border-left:3px solid var(--yellow);
    padding:12px 16px 13px;
    font-size:13px; letter-spacing:.06em; line-height:1.8;
    color:var(--text);
    box-shadow:8px 8px 26px rgba(0,0,0,.7);
  }
  #about.on{display:block;}
  #about .co{
    color:var(--yellow); font-weight:800; font-size:12px;
    letter-spacing:.24em; text-transform:uppercase; margin-bottom:5px;
  }
  #about .fine{
    margin-top:6px; font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--dim);
  }
  #bug .live{
    font-size:12px; letter-spacing:.3em; color:var(--cyan);
    text-transform:uppercase;
    text-shadow:0 0 8px rgba(0,240,255,.7);
  }
  #bug .live::before{
    content:"●"; color:var(--red); margin-right:6px;
    animation:blink 1.4s steps(1,end) infinite;
  }
  @keyframes blink{50%{opacity:.15;}}

  #counter{
    position:absolute; top:22px; right:24px; z-index:8;
    font-size:14px; letter-spacing:.28em; color:var(--dim);
    text-transform:uppercase; user-select:none; pointer-events:none;
  }
  #counter b{color:var(--text); font-weight:700;}

  #banner{
    position:absolute; right:0; bottom:0; z-index:9;
    min-width:230px; min-height:98px;
    display:flex; flex-direction:column; justify-content:center;
    background:linear-gradient(105deg, #101014 0%, #17171d 100%);
    border-top:3px solid var(--yellow);
    border-left:3px solid var(--yellow);
    padding:10px 18px 12px 16px;
    user-select:none; pointer-events:none;
    box-shadow:-6px -6px 24px rgba(0,0,0,.6);
  }
  #banner .row1{display:flex; align-items:baseline; gap:8px;}
  #banner .adword{
    font-weight:800; font-size:26px; letter-spacing:.05em;
    color:var(--yellow);
    animation:flick 6s linear infinite;
  }
  @keyframes flick{0%,93%,95%,100%{opacity:1;}94%{opacity:.35;}}
  #banner .num{font-size:15px; color:var(--cyan); letter-spacing:.12em; font-weight:600;}
  #banner .row2{
    font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:var(--dim);
    margin-top:2px; white-space:nowrap; overflow:hidden;
  }

  #soundHint{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:10; cursor:pointer;
    font-size:14px; letter-spacing:.3em; text-transform:uppercase;
    color:var(--yellow); background:rgba(0,0,0,.72);
    border:1px solid var(--yellow);
    padding:12px 26px;
    user-select:none;
    animation:flick 4s linear infinite;
  }
  #soundHint.gone{display:none;}

  #errMsg{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    z-index:10; text-align:center;
    font-size:14px; letter-spacing:.2em; text-transform:uppercase;
    color:var(--dim); max-width:80vw; line-height:2;
  }
  #errMsg b{color:var(--red); display:block; font-size:18px; margin-bottom:6px;}

  /* ============ ATTENTION LAPSE STINGER ============ */
  #lapse{
    position:absolute; inset:0; z-index:20; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    background:rgba(0,0,0,.86); text-align:center; pointer-events:none;
  }
  #lapse.on{display:flex;}
  #lapse .warn{
    color:var(--red); font-weight:800; font-size:32px;
    letter-spacing:.18em; text-transform:uppercase;
    text-shadow:0 0 18px rgba(255,0,60,.8);
    animation:blink .5s steps(1,end) infinite;
  }
  #lapse .sub{
    margin-top:10px; font-size:13px; letter-spacing:.3em;
    text-transform:uppercase; color:var(--dim);
  }

  @media (prefers-reduced-motion:reduce){
    #banner .adword, #soundHint, #lapse .warn{animation:none;}
    #bug .live::before{animation:none;}
    #static.zap{animation:none; opacity:0;}
  }
  @media (max-width:640px){
    #bug .live{display:none;}
  }
</style>
</head>
<body>

<video id="vidA" playsinline preload="auto" muted></video>
<video id="vidB" playsinline preload="auto" muted></video>

<div id="static"><canvas id="noise"></canvas></div>
<div id="crt"></div>

<div id="bug">
  <span class="tag">CONSUME ADS</span>
  <span class="live">On Air</span>
</div>

<div id="about">
  <div class="co">Consume Ads Ltd.</div>
  The ads are not the product. The watching is.
  <div class="fine">Broadcasting since 2026 · A subsidiary of a subsidiary</div>
</div>

<div id="counter"><b id="cNow">–</b> / <span id="cTotal">–</span></div>

<div id="banner">
  <div class="row1">
    <span class="adword">AD BREAK</span>
    <span class="num" id="bannerNum">#—</span>
  </div>
  <div class="row2">Sponsored transmission</div>
</div>

<div id="lapse">
  <div class="warn">Attention lapse detected</div>
  <div class="sub">Your absence has been logged</div>
</div>

<div id="soundHint">Tap for sound</div>

<script>
/* =====================================================================
   ZERO-MAINTENANCE SETUP FOR GITHUB PAGES

   Repo layout:
     index.html          (this file)
     ads8/
       whatever-1.mp4
       whatever-2.mp4
       ...

   Push a new .mp4 into ads8/ and it appears in the rotation
   automatically — nothing to edit, ever. The page asks the GitHub
   API for the folder's contents on every load.

   If the site runs at  username.github.io/reponame/  the repo is
   detected automatically and you can leave OWNER/REPO empty.
   Only fill these in if you use a custom domain:
   ===================================================================== */
const OWNER  = "";       // e.g. "yourusername"  (leave "" to auto-detect)
const REPO   = "";       // e.g. "just-ads"      (leave "" to auto-detect)
const FOLDER = "ads8";   // folder in the repo that holds the videos
/* ===================================================================== */

(() => {
  const $ = id => document.getElementById(id);
  const vids = { A: $('vidA'), B: $('vidB') };
  vids.B.style.display = 'none';
  let active = 'A';
  let pos = 0;
  let playlist = [];   // [{name, url}]

  /* company logo → tiny about card */
  const about = $('about');
  document.querySelector('#bug .tag').addEventListener('click', e => {
    e.stopPropagation();
    about.classList.toggle('on');
  });
  about.addEventListener('click', e => e.stopPropagation());
  // clicking anywhere else closes it — opening must be intentional
  document.addEventListener('click', () => about.classList.remove('on'));

  /* ---------------- tab-away alarm ---------------- */
  let audioCtx = null, alarmNodes = null, titleTimer = null;
  const baseTitle = document.title;

  function startAlarm(){
    if (!audioCtx || audioCtx.state !== 'running') return;
    if (alarmNodes) return;
    const osc = audioCtx.createOscillator();
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = 740;
    lfo.type = 'square';
    lfo.frequency.value = 2.4;          // two-tone siren
    lfoGain.gain.value = 180;
    lfo.connect(lfoGain).connect(osc.frequency);
    gain.gain.value = 0.06;             // loud enough to notice, not to deafen
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(); lfo.start();
    alarmNodes = { osc, lfo, gain };
  }
  function stopAlarm(){
    if (!alarmNodes) return;
    try { alarmNodes.osc.stop(); alarmNodes.lfo.stop(); } catch {}
    alarmNodes = null;
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden){
      vids[active].pause();                 // the broadcast waits for you
      startAlarm();
      let flip = false;
      titleTimer = setInterval(() => {
        document.title = (flip = !flip) ? '⚠ RETURN TO ADS ⚠' : '⚠ ATTENTION REQUIRED ⚠';
      }, 800);
    } else {
      stopAlarm();
      clearInterval(titleTimer);
      document.title = baseTitle;
      // shame stinger on return — ad stays paused until it fades
      const l = $('lapse');
      l.classList.add('on');
      setTimeout(() => {
        l.classList.remove('on');
        vids[active].play().catch(()=>{});  // resume only after the message clears
      }, 2400);
    }
  });

  function fail(title, detail){
    document.body.insertAdjacentHTML('beforeend',
      `<div id="errMsg"><b>${title}</b>${detail}</div>`);
  }

  function detectRepo(){
    if (OWNER && REPO) return { owner: OWNER, repo: REPO };
    const host = location.hostname;                       // username.github.io
    const m = host.match(/^([^.]+)\.github\.io$/i);
    if (!m) return null;
    const seg = location.pathname.split('/').filter(Boolean);
    // project site: username.github.io/repo/...  |  user site: username.github.io
    return { owner: m[1], repo: seg.length ? seg[0] : m[1] + '.github.io' };
  }

  async function loadPlaylist(){
    const r = detectRepo();
    if (!r){
      fail('No signal', 'Loading... Please Wait.');
      return;
    }
    const api = `https://api.github.com/repos/${r.owner}/${r.repo}/contents/${FOLDER}`;
    let resp;
    try { resp = await fetch(api); }
    catch { fail('No signal', 'Could not reach the GitHub API.'); return; }
    if (!resp.ok){
      fail('No signal', `GitHub API said ${resp.status}. Check the "${FOLDER}" folder exists in ${r.owner}/${r.repo} and the repo is public.`);
      return;
    }
    const items = await resp.json();
    playlist = items
      .filter(f => f.type === 'file' && /\.(mp4|webm|mov|m4v)$/i.test(f.name))
      .map(f => ({ name: f.name.replace(/\.[^.]+$/,''), url: f.download_url }))
      .sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric:true}));

    if (!playlist.length){
      fail('Dead air', `The "${FOLDER}" folder has no video files yet.`);
      return;
    }
    $('cTotal').textContent = playlist.length;
    playAt(0, false);
  }

  function updateHud(){
    $('cNow').textContent = pos + 1;
    $('bannerNum').textContent = '#' + String(pos + 1).padStart(3,'0');
  }

  function playAt(newPos, withZap = true){
    pos = ((newPos % playlist.length) + playlist.length) % playlist.length;
    const cur = vids[active];
    const nxtKey = active === 'A' ? 'B' : 'A';
    const nxt = vids[nxtKey];

    nxt.src = playlist[pos].url;
    nxt.muted = cur.muted;

    const swap = () => {
      nxt.style.display = '';
      cur.style.display = 'none';
      cur.pause();
      cur.removeAttribute('src');
      cur.load();
      active = nxtKey;
      updateHud();
    };
    nxt.play().then(swap).catch(swap);
    if (withZap) zap();
  }

  const advance = () => playAt(pos + 1);
  vids.A.addEventListener('ended', advance);
  vids.B.addEventListener('ended', advance);
  vids.A.addEventListener('error', () => { if (playlist.length) setTimeout(advance, 400); });
  vids.B.addEventListener('error', () => { if (playlist.length) setTimeout(advance, 400); });

  /* static burst */
  const noiseCv = $('noise'), staticEl = $('static');
  function zap(){
    if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const c = noiseCv.getContext('2d');
    noiseCv.width = 320; noiseCv.height = 180;
    const img = c.createImageData(320, 180);
    for (let i = 0; i < img.data.length; i += 4){
      const v = Math.random() * 255 | 0;
      img.data[i] = img.data[i+1] = img.data[i+2] = v;
      img.data[i+3] = 255;
    }
    c.putImageData(img, 0, 0);
    staticEl.classList.remove('zap');
    void staticEl.offsetWidth;
    staticEl.classList.add('zap');
  }

  /* unmute on first interaction — browsers require muted autoplay.
     The same gesture unlocks the AudioContext used by the alarm. */
  function enableSound(){
    vids.A.muted = false; vids.B.muted = false;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume().catch(()=>{});
    } catch {}
    $('soundHint').classList.add('gone');
    vids[active].play().catch(()=>{});
    document.removeEventListener('click', enableSound);
    document.removeEventListener('touchstart', enableSound);
  }
  document.addEventListener('click', enableSound);
  document.addEventListener('touchstart', enableSound);

  loadPlaylist();
})();
</script>
</body>
</html>
